services:
  postgres:
    image: postgres:16
    container_name: nimbus-postgres
    environment:
      POSTGRES_DB: nimbus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - nimbus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nimbus"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  nimbus_pg_data:
