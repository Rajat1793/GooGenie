<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GooGenie</title>

    <!--
      ① Apply theme BEFORE React renders to prevent light→dark flash.
         Reads the same key ThemeContext uses ("nimbus-theme").
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("nimbus-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (t === "dark" || (!t && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (_) {}
      })();
    </script>

    <!--
      ② Critical CSS — loaded inline so it's available before ANY JS or
         external stylesheet. Covers:
         • CSS variables (light + dark) so colors never flash as "var(--…)"
         • Material Symbols font-family assignment, so the browser starts
           fetching the icon font immediately and keeps the text invisible
           (font-display: block) while it loads — preventing icon names
           like "inbox", "cloud" from showing as text.
         • Body background/color so the canvas is correct from frame 1.
    -->
    <style>
      /* ── Light theme vars (mirrors index.css :root) ── */
      :root {
        --c-background: #f8f9fd;
        --c-surface: #f8f9fd;
        --c-surface-container-low: #f3f3f7;
        --c-surface-container: #edeef1;
        --c-surface-container-high: #e7e8eb;
        --c-on-surface: #191c1e;
        --c-on-surface-variant: #41474e;
        --c-outline: #71787f;
        --c-outline-variant: #c1c7cf;
        --c-primary: #2b6389;
        --c-on-primary: #ffffff;
        --c-primary-container: #8cc0eb;
        --c-error: #ba1a1a;
        --c-error-container: #ffdad6;
        --c-secondary: #466272;
        --c-secondary-container: #c6e4f7;
        --c-tertiary: #835418;
        --c-tertiary-container: #ecae6a;
        --c-ink-text: #2D3436;
        --sidebar-bg: #f3f3f7;
        --sidebar-border: rgba(193,199,207,0.4);
        --header-bg: rgba(248,249,253,0.9);
        --glass-bg: rgba(255,249,210,0.45);
        --glass-border: rgba(43,99,137,0.1);
        --glass-shadow: 0 4px 24px -4px rgba(43,99,137,0.08);
        --font-body: "Hanken Grotesk";
        --font-headline: "EB Garamond";
      }

      /* ── Dark theme vars (mirrors index.css .dark) ── */
      .dark {
        --c-background: #111319;
        --c-surface: #111319;
        --c-surface-container-low: #191b22;
        --c-surface-container: #1d1f26;
        --c-surface-container-high: #282a30;
        --c-on-surface: #e2e2ea;
        --c-on-surface-variant: #c1c7cf;
        --c-outline: #8b9199;
        --c-outline-variant: #41474e;
        --c-primary: #b2dbff;
        --c-on-primary: #003450;
        --c-primary-container: #8cc0eb;
        --c-error: #ffb4ab;
        --c-error-container: #93000a;
        --c-secondary: #edbca4;
        --c-secondary-container: #64412e;
        --c-tertiary: #e8cbff;
        --c-tertiary-container: #d5a8ff;
        --c-ink-text: #e2e2ea;
        --sidebar-bg: #191b22;
        --sidebar-border: rgba(255,255,255,0.05);
        --header-bg: rgba(17,19,25,0.9);
        --glass-bg: rgba(30,34,43,0.65);
        --glass-border: rgba(255,255,255,0.05);
        --glass-shadow: 0 0 40px -10px rgba(140,192,235,0.12);
        --font-body: "Hanken Grotesk";
        --font-headline: "EB Garamond";
      }

      /* ── Prevent icon names from flashing as text ── */
      /* This rule MUST be here (not in a JS-bundled CSS file) so the browser
         knows to load Material Symbols for these elements immediately and
         keeps them invisible (font-display:block) until the font arrives. */
      .material-symbols-outlined {
        font-family: "Material Symbols Outlined";
        font-weight: normal;
        font-style: normal;
        font-size: 20px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 24;
        /* Keep invisible while font loads — browser respects font-display:block
           from the @font-face, which is set by the Google Fonts stylesheet. */
      }

      /* ── Instant body canvas — no flash of white / wrong color ── */
      body {
        background-color: var(--c-background);
        color: var(--c-on-surface);
        margin: 0;
      }

      /* ── Loading spinner shown before React mounts ── */
      #root:empty::after {
        content: "";
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--c-background);
      }
    </style>

    <!--
      ③ Fonts — preconnect is fast; load body + headline fonts with
         display=swap (text immediately visible with system font, swaps
         when custom font is ready — no blocking).
         Material Symbols uses display=block to prevent icon-name flash.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
