name: web-checks

on:
  push:
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/web-checks.yml"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/web-checks.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @googenie/db run typecheck || true
      - run: pnpm --filter @googenie/server run typecheck || true
      - run: pnpm --filter @googenie/web run typecheck
      - run: pnpm --filter @googenie/web run lint || true
      - name: Build smoke
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
        run: pnpm --filter @googenie/web run build

  mobile-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter googenie-mobile run typecheck || true
